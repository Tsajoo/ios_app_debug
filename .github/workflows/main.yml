name: Build Unsigned IPA (for TrollStore)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Regenerate iOS project
        run: |
          rm -rf ios/ android/
          flutter create --org com.example --project-name biogas --platforms=android,ios .

      # ------------------------------------------------------------------
      # 1. Patch project.pbxproj – line‑by‑line replacement (bulletproof)
      # ------------------------------------------------------------------
      - name: Patch project.pbxproj (disable signing)
        run: |
          python3 - <<'PYEOF'
          import re, pathlib

          pbx = pathlib.Path("ios/Runner.xcodeproj/project.pbxproj")
          lines = pbx.read_text().splitlines(keepends=True)

          patched = []
          for line in lines:
              l = line
              # Override each key if present
              l = re.sub(r'DEVELOPMENT_TEAM\s*=\s*[^;]+;', 'DEVELOPMENT_TEAM = "";', l)
              l = re.sub(r'CODE_SIGN_STYLE\s*=\s*[^;]+;',  'CODE_SIGN_STYLE = Manual;', l)
              l = re.sub(r'CODE_SIGN_IDENTITY\s*=\s*[^;]+;', 'CODE_SIGN_IDENTITY = "";', l)
              l = re.sub(r'PROVISIONING_PROFILE_SPECIFIER\s*=\s*[^;]+;', 'PROVISIONING_PROFILE_SPECIFIER = "";', l)
              l = re.sub(r'CODE_SIGNING_REQUIRED\s*=\s*[^;]+;', 'CODE_SIGNING_REQUIRED = NO;', l)
              l = re.sub(r'CODE_SIGNING_ALLOWED\s*=\s*[^;]+;', 'CODE_SIGNING_ALLOWED = NO;', l)
              patched.append(l)

          pbx.write_text(''.join(patched))
          print("project.pbxproj patched OK")
          PYEOF

      # ------------------------------------------------------------------
      # 2. Verify the patch – fails the job if any signing requirement remains
      # ------------------------------------------------------------------
      - name: Verify no signing team remains
        run: |
          if grep -qE 'DEVELOPMENT_TEAM\s*=\s*[^"];' ios/Runner.xcodeproj/project.pbxproj; then
            echo "ERROR: DEVELOPMENT_TEAM still set to non-empty value!"
            exit 1
          fi
          if grep -qE 'CODE_SIGNING_ALLOWED\s*=\s*YES;' ios/Runner.xcodeproj/project.pbxproj; then
            echo "ERROR: CODE_SIGNING_ALLOWED still YES!"
            exit 1
          fi
          echo "Signing successfully disabled."

      # ------------------------------------------------------------------
      # 3. Place GoogleService-Info.plist (dummy if secret not set)
      # ------------------------------------------------------------------
      - name: Place GoogleService-Info.plist
        env:
          PLIST_CONTENTS: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          if [ -n "$PLIST_CONTENTS" ]; then
            echo "$PLIST_CONTENTS" > ios/Runner/GoogleService-Info.plist
            echo "Using real GoogleService-Info.plist"
          else
            cat > ios/Runner/GoogleService-Info.plist << 'DUMY'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CLIENT_ID</key>
              <string>dummy</string>
              <key>REVERSED_CLIENT_ID</key>
              <string>dummy</string>
              <key>API_KEY</key>
              <string>dummy</string>
              <key>GCM_SENDER_ID</key>
              <string>dummy</string>
              <key>PLIST_VERSION</key>
              <string>1</string>
              <key>BUNDLE_ID</key>
              <string>com.example.biogas</string>
              <key>PROJECT_ID</key>
              <string>dummy</string>
              <key>STORAGE_BUCKET</key>
              <string>dummy</string>
              <key>IS_ADS_ENABLED</key>
              <false/>
              <key>IS_ANALYTICS_ENABLED</key>
              <false/>
              <key>IS_APPINVITE_ENABLED</key>
              <true/>
              <key>IS_GCM_ENABLED</key>
              <true/>
              <key>IS_SIGNIN_ENABLED</key>
              <true/>
              <key>GOOGLE_APP_ID</key>
              <string>dummy</string>
              <key>DATABASE_URL</key>
              <string>https://dummy.firebaseio.com</string>
          </dict>
          </plist>
          DUMY
            echo "Using dummy GoogleService-Info.plist"
          fi

      # ------------------------------------------------------------------
      # 4. Patch Info.plist (ATS + background modes)
      # ------------------------------------------------------------------
      - name: Patch Info.plist
        run: |
          python3 - <<'PYEOF'
          import plistlib, pathlib
          p = pathlib.Path("ios/Runner/Info.plist")
          with p.open("rb") as f:
              data = plistlib.load(f)
          data.setdefault("NSAppTransportSecurity", {})
          data["NSAppTransportSecurity"]["NSAllowsArbitraryLoads"] = True
          modes = data.setdefault("UIBackgroundModes", [])
          for m in ["fetch", "remote-notification"]:
              if m not in modes:
                  modes.append(m)
          with p.open("wb") as f:
              plistlib.dump(data, f, fmt=plistlib.FMT_XML)
          print("Info.plist patched OK")
          PYEOF

      # ------------------------------------------------------------------
      # 5. Write Podfile – now also modifies Runner project's build settings
      # ------------------------------------------------------------------
      - name: Write Podfile
        run: |
          cat > ios/Podfile << 'PODEOF'
          platform :ios, '13.0'
          ENV['COCOAPODS_DISABLE_STATS'] = 'true'

          project 'Runner', {
            'Debug'   => :debug,
            'Profile' => :release,
            'Release' => :release,
          }

          def flutter_root
            generated = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)
            raise "#{generated} must exist. Run flutter pub get first." unless File.exist?(generated)
            File.foreach(generated) do |line|
              m = line.match(/FLUTTER_ROOT\=(.*)/)
              return m[1].strip if m
            end
            raise "FLUTTER_ROOT not found in #{generated}."
          end

          require File.expand_path(File.join('packages', 'flutter_tools', 'bin', 'podhelper'), flutter_root)

          flutter_ios_podfile_setup

          target 'Runner' do
            use_frameworks!
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))

            target 'RunnerTests' do
              inherit! :search_paths
            end
          end

          post_install do |installer|
            # ---- Pod targets: allow non-modular includes + disable signing ----
            installer.pods_project.build_configurations.each do |config|
              config.build_settings['CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES'] = 'YES'
            end

            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                config.build_settings['CODE_SIGNING_ALLOWED']       = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED']      = 'NO'
                config.build_settings['CODE_SIGN_IDENTITY']         = ''
                config.build_settings['CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES'] = 'YES'
              end
            end

            # ---- Append flag to every Pods xcconfig ----
            Dir.glob(File.join(installer.sandbox.root, 'Target Support Files', '**', '*.xcconfig')).each do |xcconfig|
              File.open(xcconfig, 'a') { |f| f.puts "\nCLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES = YES" }
            end

            # ---- NEW: force disable signing on the Runner project itself ----
            runner_project_path = File.join(installer.sandbox.root, '..', 'Runner.xcodeproj')
            if File.exist?(runner_project_path)
              require 'xcodeproj'
              runner_project = Xcodeproj::Project.open(runner_project_path)
              runner_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings['CODE_SIGNING_ALLOWED']       = 'NO'
                  config.build_settings['CODE_SIGNING_REQUIRED']      = 'NO'
                  config.build_settings['CODE_SIGN_IDENTITY']         = ''
                  config.build_settings['DEVELOPMENT_TEAM']           = ''
                  config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = ''
                end
              end
              runner_project.save
              puts "Runner project signing disabled via Podfile post_install."
            end
          end
          PODEOF

      - name: Flutter pub get
        run: flutter pub get

      # ------------------------------------------------------------------
      # 6. Strip any DEVELOPMENT_TEAM from all .xcconfig files
      # ------------------------------------------------------------------
      - name: Strip DEVELOPMENT_TEAM from xcconfig files
        run: |
          echo "Removing DEVELOPMENT_TEAM lines from all xcconfig files..."
          find ios -name "*.xcconfig" -type f -exec sed -i '' '/DEVELOPMENT_TEAM/d' {} \;
          # Verify nothing remains
          if find ios -name "*.xcconfig" -type f -exec grep -l 'DEVELOPMENT_TEAM' {} \; ; then
            echo "ERROR: DEVELOPMENT_TEAM still present in xcconfig files!"
            exit 1
          fi
          echo "All xcconfig files clean."

      # ------------------------------------------------------------------
      # 7. Final verification: no signing team anywhere
      # ------------------------------------------------------------------
      - name: Final signing verification
        run: |
          if grep -qE 'DEVELOPMENT_TEAM\s*=\s*"[^"]+"' ios/Runner.xcodeproj/project.pbxproj; then
            echo "ERROR: Non-empty DEVELOPMENT_TEAM still in project.pbxproj!"
            exit 1
          fi
          if grep -qE 'CODE_SIGNING_ALLOWED\s*=\s*YES;' ios/Runner.xcodeproj/project.pbxproj; then
            echo "ERROR: CODE_SIGNING_ALLOWED still YES!"
            exit 1
          fi
          echo "Signing successfully disabled everywhere."

      # ------------------------------------------------------------------
      # 8. Build unsigned app
      # ------------------------------------------------------------------
      - name: Build unsigned app
        run: flutter build ios --release --no-codesign

      # ------------------------------------------------------------------
      # 9. Verify binary & package IPA
      # ------------------------------------------------------------------
      - name: Verify binary exists
        run: |
          APP="build/ios/iphoneos/Runner.app"
          BIN="$APP/Runner"
          [ -d "$APP" ] || { echo "Runner.app missing"; exit 1; }
          [ -f "$BIN" ] || { echo "Binary missing — assemble failed"; ls -lah "$APP"; exit 1; }
          BIN_BYTES=$(stat -f%z "$BIN")
          echo "App: $(du -sh $APP | cut -f1)  Binary: $(du -sh $BIN | cut -f1)  (${BIN_BYTES} bytes)"
          [ "$BIN_BYTES" -gt 1000000 ] || echo "WARNING: binary suspiciously small"

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r biogas.ipa Payload/
          echo "IPA: $(du -sh biogas.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: biogas-trollstore.ipa
          path: biogas.ipa
