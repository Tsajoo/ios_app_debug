name: Build Unsigned IPA (for TrollStore)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Regenerate iOS project
        run: |
          rm -rf ios/ android/
          flutter create --org com.example --project-name biogas --platforms=android,ios .

      # ------------------------------------------------------------------
      # 1. Patch project.pbxproj – disable signing, set dummy team
      # ------------------------------------------------------------------
      - name: Patch project.pbxproj (disable signing, dummy team)
        run: |
          python3 - <<'PYEOF'
          import pathlib

          pbx = pathlib.Path("ios/Runner.xcodeproj/project.pbxproj")
          lines = pbx.read_text().splitlines(keepends=True)

          targets = {
              'DEVELOPMENT_TEAM':             '"0000000000"',
              'CODE_SIGN_STYLE':              'Manual',
              'CODE_SIGN_IDENTITY':           '""',
              'PROVISIONING_PROFILE_SPECIFIER': '"dummy"',
              'CODE_SIGNING_REQUIRED':        'NO',
              'CODE_SIGNING_ALLOWED':         'NO',
          }

          new_lines = []
          for line in lines:
              stripped = line.lstrip()
              replaced = False
              for key, forced_value in targets.items():
                  if key in stripped and '=' in stripped:
                      indent = line[:len(line) - len(line.lstrip())]
                      new_lines.append(f'{indent}{key} = {forced_value};\n')
                      replaced = True
                      break
              if not replaced:
                  new_lines.append(line)

          pbx.write_text(''.join(new_lines))
          print("project.pbxproj patched (brute-force)")
          PYEOF

      # ------------------------------------------------------------------
      # 2. Place GoogleService-Info.plist (dummy if secret not set)
      # ------------------------------------------------------------------
      - name: Place GoogleService-Info.plist
        env:
          PLIST_CONTENTS: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          if [ -n "$PLIST_CONTENTS" ]; then
            echo "$PLIST_CONTENTS" > ios/Runner/GoogleService-Info.plist
            echo "Using real GoogleService-Info.plist"
          else
            cat > ios/Runner/GoogleService-Info.plist << 'DUMY'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CLIENT_ID</key>
              <string>dummy</string>
              <key>REVERSED_CLIENT_ID</key>
              <string>dummy</string>
              <key>API_KEY</key>
              <string>dummy</string>
              <key>GCM_SENDER_ID</key>
              <string>dummy</string>
              <key>PLIST_VERSION</key>
              <string>1</string>
              <key>BUNDLE_ID</key>
              <string>com.example.biogas</string>
              <key>PROJECT_ID</key>
              <string>dummy</string>
              <key>STORAGE_BUCKET</key>
              <string>dummy</string>
              <key>IS_ADS_ENABLED</key>
              <false/>
              <key>IS_ANALYTICS_ENABLED</key>
              <false/>
              <key>IS_APPINVITE_ENABLED</key>
              <true/>
              <key>IS_GCM_ENABLED</key>
              <true/>
              <key>IS_SIGNIN_ENABLED</key>
              <true/>
              <key>GOOGLE_APP_ID</key>
              <string>dummy</string>
              <key>DATABASE_URL</key>
              <string>https://dummy.firebaseio.com</string>
          </dict>
          </plist>
          DUMY
            echo "Using dummy GoogleService-Info.plist"
          fi

      # ------------------------------------------------------------------
      # 3. Patch Info.plist
      # ------------------------------------------------------------------
      - name: Patch Info.plist
        run: |
          python3 - <<'PYEOF'
          import plistlib, pathlib
          p = pathlib.Path("ios/Runner/Info.plist")
          with p.open("rb") as f:
              data = plistlib.load(f)
          data.setdefault("NSAppTransportSecurity", {})
          data["NSAppTransportSecurity"]["NSAllowsArbitraryLoads"] = True
          modes = data.setdefault("UIBackgroundModes", [])
          for m in ["fetch", "remote-notification"]:
              if m not in modes:
                  modes.append(m)
          with p.open("wb") as f:
              plistlib.dump(data, f, fmt=plistlib.FMT_XML)
          print("Info.plist patched OK")
          PYEOF

      # ------------------------------------------------------------------
      # 4. Write Podfile (post_install sets dummy team on Runner target)
      # ------------------------------------------------------------------
      - name: Write Podfile
        run: |
          cat > ios/Podfile << 'PODEOF'
          platform :ios, '13.0'
          ENV['COCOAPODS_DISABLE_STATS'] = 'true'

          project 'Runner', {
            'Debug'   => :debug,
            'Profile' => :release,
            'Release' => :release,
          }

          def flutter_root
            generated = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)
            raise "#{generated} must exist. Run flutter pub get first." unless File.exist?(generated)
            File.foreach(generated) do |line|
              m = line.match(/FLUTTER_ROOT\=(.*)/)
              return m[1].strip if m
            end
            raise "FLUTTER_ROOT not found in #{generated}."
          end

          require File.expand_path(File.join('packages', 'flutter_tools', 'bin', 'podhelper'), flutter_root)

          flutter_ios_podfile_setup

          target 'Runner' do
            use_frameworks!
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))

            target 'RunnerTests' do
              inherit! :search_paths
            end
          end

          post_install do |installer|
            installer.pods_project.build_configurations.each do |config|
              config.build_settings['CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES'] = 'YES'
            end

            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                config.build_settings['CODE_SIGNING_ALLOWED']       = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED']      = 'NO'
                config.build_settings['CODE_SIGN_IDENTITY']         = ''
                config.build_settings['CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES'] = 'YES'
              end
            end

            Dir.glob(File.join(installer.sandbox.root, 'Target Support Files', '**', '*.xcconfig')).each do |xcconfig|
              File.open(xcconfig, 'a') { |f| f.puts "\nCLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES = YES" }
            end

            # Set dummy team on Runner project itself
            runner_project_path = File.join(installer.sandbox.root, '..', 'Runner.xcodeproj')
            if File.exist?(runner_project_path)
              require 'xcodeproj'
              runner_project = Xcodeproj::Project.open(runner_project_path)
              runner_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings['DEVELOPMENT_TEAM']           = '0000000000'
                  config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = 'dummy'
                  config.build_settings['CODE_SIGNING_ALLOWED']       = 'NO'
                  config.build_settings['CODE_SIGNING_REQUIRED']      = 'NO'
                  config.build_settings['CODE_SIGN_IDENTITY']         = ''
                end
              end
              runner_project.save
              puts "Runner project signing disabled (dummy team set)."
            end
          end
          PODEOF

      - name: Flutter pub get
        run: flutter pub get

      # ------------------------------------------------------------------
      # 5. Override signing settings in all xcconfig files
      # ------------------------------------------------------------------
      - name: Override signing settings in all xcconfig files
        run: |
          python3 - <<'PYEOF'
          import pathlib

          override = """
          CODE_SIGNING_ALLOWED = NO
          CODE_SIGNING_REQUIRED = NO
          CODE_SIGN_IDENTITY = 
          DEVELOPMENT_TEAM = 0000000000
          PROVISIONING_PROFILE_SPECIFIER = dummy
          CODE_SIGN_STYLE = Manual
          CODE_SIGN_ENTITLEMENTS = 
          """

          for xcconfig in pathlib.Path("ios").rglob("*.xcconfig"):
              if not xcconfig.is_file():
                  continue
              content = xcconfig.read_text()
              lines = content.splitlines(keepends=True)
              clean_lines = []
              for line in lines:
                  if not any(key in line for key in [
                      "DEVELOPMENT_TEAM",
                      "CODE_SIGNING_REQUIRED",
                      "CODE_SIGNING_ALLOWED",
                      "CODE_SIGN_IDENTITY",
                      "PROVISIONING_PROFILE_SPECIFIER",
                      "CODE_SIGN_STYLE",
                      "CODE_SIGN_ENTITLEMENTS"
                  ]):
                      clean_lines.append(line)
              new_content = ''.join(clean_lines) + override
              xcconfig.write_text(new_content)
              print(f"Processed: {xcconfig}")

          print("All xcconfig files now end with signing-disabled overrides.")
          PYEOF

      # ------------------------------------------------------------------
      # 6. GUARANTEE dummy team in pbxproj (Python – bulletproof)
      # ------------------------------------------------------------------
      - name: Force DEVELOPMENT_TEAM = 0000000000 in pbxproj
        run: |
          python3 - <<'PYEOF'
          import pathlib

          pbx_path = pathlib.Path("ios/Runner.xcodeproj/project.pbxproj")
          content = pbx_path.read_text()
          new_lines = []
          for line in content.splitlines(keepends=True):
              if 'DEVELOPMENT_TEAM' in line and '=' in line:
                  # Keep original indentation
                  leading = line[:len(line) - len(line.lstrip())]
                  new_lines.append(f'{leading}DEVELOPMENT_TEAM = "0000000000";\n')
              else:
                  new_lines.append(line)

          pbx_path.write_text(''.join(new_lines))
          print("DEVELOPMENT_TEAM lines replaced (Python).")

          # Verify
          verify_content = pbx_path.read_text()
          if 'DEVELOPMENT_TEAM = "0000000000";' in verify_content:
              print("Verification successful: dummy team present.")
          else:
              print("ERROR: dummy team not found after replacement!")
              exit(1)
          PYEOF

      # ------------------------------------------------------------------
      # 7. Final verification (signing still disabled)
      # ------------------------------------------------------------------
      - name: Final signing verification
        run: |
          if grep -qE 'CODE_SIGNING_ALLOWED\s*=\s*YES;' ios/Runner.xcodeproj/project.pbxproj; then
            echo "ERROR: CODE_SIGNING_ALLOWED still YES!"
            exit 1
          fi
          echo "All checks passed. Ready for unsigned build."

      # ------------------------------------------------------------------
      # 8. Build unsigned app
      # ------------------------------------------------------------------
      - name: Build unsigned app
        run: flutter build ios --release --no-codesign

      # ------------------------------------------------------------------
      # 9. Verify binary & package IPA
      # ------------------------------------------------------------------
      - name: Verify binary exists
        run: |
          APP="build/ios/iphoneos/Runner.app"
          BIN="$APP/Runner"
          [ -d "$APP" ] || { echo "Runner.app missing"; exit 1; }
          [ -f "$BIN" ] || { echo "Binary missing — assemble failed"; ls -lah "$APP"; exit 1; }
          BIN_BYTES=$(stat -f%z "$BIN")
          echo "App: $(du -sh $APP | cut -f1)  Binary: $(du -sh $BIN | cut -f1)  (${BIN_BYTES} bytes)"
          [ "$BIN_BYTES" -gt 1000000 ] || echo "WARNING: binary suspiciously small"

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r biogas.ipa Payload/
          echo "IPA: $(du -sh biogas.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: biogas-trollstore.ipa
          path: biogas.ipa
